name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint – ruff (non-blocking)
        run: |
          pip install ruff --quiet
          ruff check backend/app --output-format=github || true

      - name: Run backend tests
        env:
          # Provide safe dummy values so Settings can instantiate
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          OPENAI_API_KEY: ""
        run: pytest tests/backend -v --tb=short

  # ── Frontend tests ───────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - name: Install frontend dependencies
        run: pip install -r frontend/requirements.txt

      - name: Run frontend tests
        run: pytest tests/frontend -v --tb=short

  # ── Plugin tests (existing) ──────────────────────────────────────────────────
  plugin-tests:
    name: Plugin tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run plugin tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          OPENAI_API_KEY: ""
        run: pytest tests/plugins -v --tb=short

  # ── All-clear gate ───────────────────────────────────────────────────────────
  all-tests-pass:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, plugin-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend tests failed" && exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "Frontend tests failed" && exit 1
          fi
          if [[ "${{ needs.plugin-tests.result }}" != "success" ]]; then
            echo "Plugin tests failed" && exit 1
          fi
          echo "All test suites passed ✓"
